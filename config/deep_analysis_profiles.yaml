# 高价值论文的中文深读档案（无档案时走通用模板）
# arxiv_id -> profile

"2506.10922":
  title: "Robustly Improving LLM Fairness in Realistic Settings via Interpretability"
  tag: "🔥 直接相关"
  one_liner: "在**招聘场景**中测试 LLM 公平性——发现简单的反偏差 prompt 在加入现实上下文（公司名、文化描述、筛选约束）后失效，提出通过识别和中和模型内部激活中的敏感属性方向来实现稳健的去偏。"
  findings:
    - "在 GPT-4o、Claude 4 Sonnet、Gemini 2.5 Flash 等 SOTA 模型上测试"
    - "加入现实上下文后，面试率出现高达 **12%** 的种族和性别偏差"
    - "偏差方向一致：所有模型都偏向 Black > White 和 female > male"
    - "模型甚至能从大学 affiliation 等细微线索中推断人口统计特征并产生偏差"
    - "Chain-of-thought 推理中看不到这些偏差——它们是**无意识的**"
  relevance:
    - "🔥 **招聘/面试场景的 LLM 偏差**：直接对应 AI 面试官方向；OPVA/Prolific 若扩展到招聘评估，实验设计可直接参考。"
    - "**内部 vs 外部去偏**：内部激活编辑 vs prompt debiasing；你的多智能体框架属外部方法，可考虑结合。"
    - "**现实性测试**：受控环境有效的去偏，在现实条件下可能失效——实验应含「现实压力测试」阶段。"
    - "⚠️ 反偏差 prompt 可能**过度矫正**并制造新偏差——与「去偏引入新偏差」的担忧一致。"

"2606.05158":
  tag: "🔥 多智能体方法论"
  one_liner: "提出 **StreamMA**：多智能体推理**流式传递**每一步中间结果，在降延迟的同时因「早期推理步更可靠」而**提升准确率**（平均 +7.3 pp）。"
  findings:
    - "现网多 Agent 多为 generate-then-transfer，延迟随深度线性增长"
    - "流式 pipeline 使下游尽早消费上游**高置信早期步**，避免后期噪声步误导"
    - "给出 stream / serial / single 三种协议的闭式分析"
    - "发现 **step-level scaling law**：per-agent 步数与 agent 数量正交可组合"
  relevance:
    - "🔥 多智能体评分流水线：评委间可流式传递 rubric 片段，降低在线面试评分延迟。"
    - "早期步加权聚合：削弱不稳定评委对总分的污染——与去偏思路同构。"
    - "⚠️ 本文优化任务推理，迁移到人类特质评分需验证是否引入顺序/长度新偏差。"

"2606.05115":
  tag: "🎯 多模态时序学习"
  one_liner: "**BabyCL** 在儿童 egocentric 视频上**单次时间顺序遍历**学习词-物映射，用双 replay buffer 逼近真实发育式学习。"
  findings:
    - "反对打乱时间、数百 epoch 重复训练的做法"
    - "多阶段时间分段 + 视觉/多模态双 buffer"
    - "在匹配算力下缩小与 offline 上界差距"
  relevance:
    - "🎯 视频/异步面试：评估模型应保留**时间结构**（轮次、停顿），勿打乱时序。"
    - "双 buffer 分通道存证据：类比多评委分模态存储，避免视觉噪声淹没文本 rubric。"

"2606.05008":
  tag: "🎯 多模态记忆评测"
  one_liner: "**M³Eval** 用认知启发的视频任务系统评估多模态模型的**记忆**：保留什么、保真度、如何遗忘。"
  findings:
    - "现有视频 benchmark 偏感知/推理，少系统测 memory"
    - "任务设计 grounded in 认知科学"
    - "揭示长视频理解中记忆瓶颈"
  relevance:
    - "🎯 长时面试/行为评估：评委是否「记住」早前回答？可作记忆维度评测框架参考。"
    - "与 LLM-as-Judge 的**跨轮一致性**问题相关。"

"2606.05106":
  tag: "📐 训练信号与 CoT"
  one_liner: "用印尼 **GASING 教学法**将算术过程序列化为 CoT，86M 模型仅 next-token 预测即达 80%+，并揭示「程序路径 → 心算联想」两阶段内化。"
  findings:
    - "教学法轨迹 = 结构化监督信号"
    - "机制分析：attention mask / probing 显示两阶段学习"
    - "小模型可匹敌大模型（特定任务）"
  relevance:
    - "📐 LLM 评分理由是否真推理：CoT 与决策可能 decouple，可引用于 confabulation 讨论。"
    - "教学法类比 **rubric 设计**：信号形态决定模型走流程还是背模式。"

"2606.06416":
  tag: "🔥 多 Agent + 无监督「评委」"
  one_liner: "**DataCOPE** 让数据分析 Agent 在**没有人工标注**的情况下，自己探索任务、自己当评委选更好的做法，并把好经验蒸馏成可复用的「技能包」注入推理——报告类任务平均涨 **9.71%**，推理类涨 **32.30%**。"
  findings:
    - "针对什么：想象你雇了一个 AI 数据分析师：它要读表、画图、写结论。高手分析师靠的不是死记硬背，而是**可复用的套路（skill）**——比如「先检查缺失值再建模」。这篇论文研究：怎么让 Agent 也学会这类套路？"
    - "解决了什么问题：人工标注「哪份分析报告更好」很贵，而且报告型、推理型任务的成功标准不一样，很难统一打分。现有「推理时加技能」思路不错，但**技能从哪来**仍是难题——不能每次都靠人写 prompt。"
    - "创新方法：提出 **DataCOPE**，三个角色循环——① **Data-Analytic Agent** 不断生成分析轨迹；② **Unsupervised Verifier**（无监督评委）比较多条轨迹谁更好；③ **Skill Manager** 用对比学习把好轨迹蒸馏成技能。报告任务用「自适应检查清单评委」：自动生成 rubric、按可验证条目打分并迭代清单；推理任务用「答案一致性评委」：答案一致的轨迹组更可信。**不改模型权重**，只在推理时注入技能。"
    - "结果怎么读：在 Deep Data Research（报告）和 DABStep（推理）上，四种模型设置平均分别提升 **9.71%** 和 **32.30%**。说明「无标注探索 + 自造评委信号」在两类分析形态都有效。"
    - "小白贴士：**Verifier** = 评委模块，这里不需要人类标签；**skill distillation** = 把多次成功尝试浓缩成一段可注入的程序性知识，类似把资深分析师的经验写成 SOP。"
  relevance:
    - "🔥 **多 Agent 评分架构**：Data-Analytic Agent ≈ 被评对象，Unsupervised Verifier ≈ LLM-as-Judge——与你「多评委 + 聚合」同构；差别是本文评委信号来自轨迹对比而非人类分数。"
    - "🔥 **无标注评测信号**：招聘/素养评分也缺大规模金标；可借鉴「检查清单覆盖度」「多评委答案一致性」作为弱监督信号，减少人工标注依赖。"
    - "📎 **技能注入 vs 微调**：推理时挂技能、不动权重——类比在线面试里动态换 rubric 片段，而不重训整个 judge 模型。"
    - "⚠️ 任务域是数据分析，迁移到主观特质评分需验证：弱监督信号是否仍与人类感知对齐。"

"2606.06380":
  tag: "📎 多 Agent 涌现通信（意识研究方法论）"
  one_liner: "用**多智能体强化学习**让 Agent 从零学沟通（几乎不给人类语言先验），观察会不会自然长出「自我指涉」等意识相关结构——证明**环境设计**能诱发 echo-mismatch 检测电路，而非任务结构本身预测得到。"
  findings:
    - "针对什么：「AI 能有意识吗？」现有两条路都有坑：①拿理论清单去**判别**模型有没有意识（容易被人类语言先验污染）；②直接往架构里塞「意识模块」（说不清是真需求还是人为设计）。作者换第三条路：**生成式**——让结构从任务里长出来。"
    - "解决了什么问题：你怎么证明某个「像自我」的行为是任务真的需要，而不是模型背了人类语言的套？需要一种**因果可归因**的实验范式：从极简起点出发，只给任务压力，看通信协议如何涌现。"
    - "创新方法：采用 **Emergent Language（EL）+ 多 Agent 强化学习**：Agent 起点极简（无语言、无自我概念、极少人类文本），只在协作任务压力下学沟通。在最小环境做概念验证，观察到**自我指涉通信**，以及 **echo-mismatch 检测电路**——后者不是任务结构或网络架构单独能预测的，而是特定**环境 affordance**（环境给的机会）诱发的。"
    - "结果怎么读：这不是宣布「做出有意识 AI」，而是提供**研究工具**：想研究意识相关结构，应先控制人类语言先验，再看任务+环境会催生什么。环境复杂度会改变涌现形态。"
    - "小白贴士：**emergent language** = 机器自己发明的「外语」，不是英语；**affordance** = 环境里某种布局/规则使得某种行为变得「划算」。"
  relevance:
    - "📎 **多 Agent 协作范式**：与你关注的 multi-agent 评估同属 Agent 系统研究，但本文目标是意识哲学而非评分。"
    - "🎯 **环境诱发行为**：类比面试场景——房间布置、提问顺序、是否录像，会诱发候选人不同表现；评分系统也要区分「特质信号」vs「场景 artifact」。"
    - "⚠️ 与 LLM-as-Judge 偏差主线弱直接相关；可作方法论储备，理解「观测到的结构未必是模型本质能力」。"

"2606.06242":
  tag: "🎯 文档多模态 + 评测基准"
  one_liner: "世界银行团队发布 **data snapshot extraction** 基准：从机构报告 PDF 里找出**真正有分析价值的图表**（不是随便框个图），实测开源版面检测模型在「学术论文」上还行、在「真实机构文档」上**大面积翻车**。"
  findings:
    - "针对什么：机构报告（人道主义报告、世行工作论文、项目评估书）里，关键信息常藏在**图表**里。任务不是「检测页面上有没有矩形」，而是 **data snapshot extraction**——定位**可复用、有语义的分析性图表/表格**。"
    - "解决了什么问题：通用文档版面分析把图/表当同质对象，不管「这张图能不能拿去二次分析」。结果：在 arXiv 式论文上表现不错的开源模型，一到真实机构文档就**泛化失败**——分不清分析图 vs 装饰图、会把组合图拆碎、漏掉解读所需的上下文。"
    - "创新方法：构建跨三类机构文档的**标注 benchmark + 评测框架**，系统 benchmark 多个开源 layout 模型，同时评**检测指标**和**空间提取质量**。公开 PDF、标注、元数据与代码（HuggingFace `ai4data/data-snapshot`）。"
    - "结果怎么读：模型在常规学术 benchmark 上的高分，**不能**外推到运营级文档智能；失败模式很具体——混淆分析/非分析内容、碎片化复合图表、上下文截断。"
    - "小白贴士：**layout detection** = 找标题、段落、图、表的位置框；**data snapshot** = 强调「这块视觉内容值得当数据资产拎出来」。"
  relevance:
    - "🎯 **多模态证据链**：若面试评分要引用候选人提交的 PDF/幻灯片，需先可靠抽取图表与表格——本文揭示「学术 benchmark 高分 ≠ 真实材料可用」。"
    - "🎯 **评测要贴近场景**：类比 OPVA/Prolific 应用域——评委模型应在**目标文档分布**上测，而非只在干净论文上测。"
    - "📎 与纯文本 LLM 评分偏差主线间接相关，但对「多模态面试材料解析」有工程参考价值。"

"2606.06473":
  tag: "🔥 自进化多 Agent（长时程搜索）"
  one_liner: "**MLEvolve** 用「渐进式树搜索 + 跨分支共享 + 回顾记忆」让 LLM 多 Agent **自己迭代 ML 算法**，在 MLE-Bench 上 SOTA，且 **12 小时预算**（仅为标准一半）仍领先；数学算法优化上也超过 AlphaEvolve。"
  findings:
    - "针对什么：LLM Agent 现在能扛**长时程任务**（自动做机器学习工程、科学发现）。难点不是单步写代码，而是**连续多轮自我改进**——像团队通宵迭代实验一样。"
    - "解决了什么问题：现有 MLE Agent 三大痛点：①搜索树各分支**互不相通**（好想法死在孤立分支里）；②**无记忆**，重复犯同样错；③战略规划和写代码搅在一起，长时程容易崩。"
    - "创新方法：**MLEvolve** 三件套——① **Progressive MCGS**：把树搜索扩展成带图引用边的结构，分支间可互相参考，搜索从广撒网逐渐聚焦（熵启发式调度）；② **Retrospective Memory**：冷启动领域知识库 + 动态全局记忆，检索复用过往成功经验；③ **规划与编码解耦**：战略层定方向，编码层自适应切换模式，稳定长迭代。"
    - "结果怎么读：MLE-Bench 上平均奖牌率、有效提交率等多维 SOTA；**12h** 预算（标准 24h 的一半）仍领先。数学算法优化任务上也优于 AlphaEvolve，说明不只会「调 Kaggle 模型」。"
    - "小白贴士：**MCGS** ≈ 蒙特卡洛图搜索，比单纯树搜索更能「跨枝借鉴」；**Retrospective Memory** ≈ 实验日志 + 经验库，新 trial 先查前人踩过的坑。"
  relevance:
    - "🔥 **多 Agent 长时程协作**：与你的评分流水线一样需要「规划 → 执行 → 复盘」；Retrospective Memory 可类比**跨被试/跨轮次的评委校准日志**。"
    - "🔥 **跨分支信息共享**：多评委若各自独立打分再聚合，可能重复同一偏差；图引用边类似「评委 B 参考评委 A 的早期高置信 rubric 片段」。"
    - "📎 任务域是 AutoML，不是人类特质评分；但 **长时程 Agent 评测方法论**（有效提交率、奖牌率）可借鉴到你的 benchmark 设计。"
    - "⚠️ 自进化搜索可能过拟合验证集——迁移到主观评分时要防「刷分式 prompt 进化」。"
